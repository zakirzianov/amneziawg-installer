name: Bug Report
description: Report a bug in the installer or management scripts
labels: [bug]

body:
  - type: dropdown
    id: script
    attributes:
      label: Script
      description: Which script is affected?
      options:
        - install_amneziawg.sh
        - install_amneziawg_en.sh
        - manage_amneziawg.sh
        - manage_amneziawg_en.sh
        - awg_common.sh
        - awg_common_en.sh
    validations:
      required: true

  - type: dropdown
    id: os-version
    attributes:
      label: OS Version
      description: Which OS version are you running?
      options:
        - Ubuntu 24.04 LTS
        - Ubuntu 25.10
        - Debian 12 (bookworm)
        - Debian 13 (trixie)
        - Other
    validations:
      required: true

  - type: input
    id: script-version
    attributes:
      label: Script Version
      description: Version of the script (shown at the top of each script or in `--version` output).
      placeholder: "e.g., 5.5"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `sudo bash install_amneziawg.sh ...`
        2. Wait for step X to complete
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: diagnostic-output
    attributes:
      label: Diagnostic output
      description: Output from the built-in diagnostic command.
      placeholder: "Paste output of: sudo bash install_amneziawg.sh --diagnostic"
      render: text
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output.
      placeholder: "Paste relevant logs from /root/awg/*.log"
      render: text
    validations:
      required: false
