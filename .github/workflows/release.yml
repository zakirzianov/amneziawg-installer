name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          if ! grep -q "^## \[${VERSION}\]" CHANGELOG.en.md; then
            echo "::error::Version ${VERSION} not found in CHANGELOG.en.md"
            exit 1
          fi

          # Extract: from version header to next version header or end of file
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.en.md > /tmp/release-notes.md

          echo "--- Release notes preview ---"
          cat /tmp/release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
