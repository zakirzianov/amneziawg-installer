name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists — skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        if: steps.check.outputs.exists != 'true'
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          if ! grep -q "^## \[${VERSION}\]" CHANGELOG.en.md; then
            echo "::error::Version ${VERSION} not found in CHANGELOG.en.md"
            exit 1
          fi

          # Extract: from version header to next version header or end of file
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.en.md > /tmp/release-notes.md

          echo "--- Release notes preview ---"
          cat /tmp/release-notes.md

      - name: Create Release
        if: steps.check.outputs.exists != 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
