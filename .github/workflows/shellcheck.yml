name: ShellCheck

on:
  push:
    branches: [main]
    paths: ['*.sh']
  pull_request:
    branches: [main]
    paths: ['*.sh']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Lint and syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Show ShellCheck version
        run: shellcheck --version

      - name: Run ShellCheck and syntax check
        run: |
          scripts=(
            install_amneziawg.sh
            install_amneziawg_en.sh
            manage_amneziawg.sh
            manage_amneziawg_en.sh
            awg_common.sh
            awg_common_en.sh
          )
          for f in "${scripts[@]}"; do
            echo "--- Checking $f ---"
            bash -n "$f"
            shellcheck -s bash -S warning "$f"
          done
