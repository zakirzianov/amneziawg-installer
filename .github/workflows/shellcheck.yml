name: ShellCheck

on:
  push:
    branches: [main]
    paths: ['*.sh', 'scripts/**', 'tests/**']
  pull_request:
    branches: [main]
    paths: ['*.sh', 'scripts/**', 'tests/**']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Lint and syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Show ShellCheck version
        run: shellcheck --version

      - name: Run ShellCheck and syntax check
        run: |
          mapfile -t scripts < <(git ls-files '*.sh' 'scripts/*.sh')
          mapfile -t test_helpers < <(git ls-files 'tests/*.bash')
          mapfile -t test_bats < <(git ls-files 'tests/*.bats')

          # bash -n only on .sh and .bash (bats syntax is not valid bash)
          for f in "${scripts[@]}" "${test_helpers[@]}"; do
            echo "--- bash -n $f ---"
            bash -n "$f"
          done

          # shellcheck on all shell files including .bats
          all=("${scripts[@]}" "${test_helpers[@]}" "${test_bats[@]}")
          for f in "${all[@]}"; do
            echo "--- shellcheck $f ---"
            shellcheck -x -s bash -S warning "$f"
          done
