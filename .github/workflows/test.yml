name: Tests

on:
  push:
    branches: [main]
    paths: ['*.sh', 'tests/**']
  pull_request:
    paths: ['*.sh', 'tests/**']

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run unit tests
        run: bats tests/*.bats
